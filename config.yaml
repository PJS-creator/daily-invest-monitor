timezone: "Asia/Seoul"

# 12개 투자 기업
# - sources는 '위에서 아래 순서'로 수집 시도 후, 발견된 기사들을 합쳐서 보여줍니다.
# - GlobeNewswire/Business Wire는 '검색 페이지'를 사용합니다.
#   (티커가 짧거나 흔한 경우(EQ 등) 결과가 섞일 수 있어, 회사명 검색 URL을 함께 넣어 두었습니다.)
