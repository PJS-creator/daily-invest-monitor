timezone: "Asia/Seoul"

# 출력/포맷 옵션
report:
  # 소스별로 "최근 몇 개"까지 긁을지 (너무 크면 페이지가 길어집니다)
  max_news_items: 8
  # 각 기업 섹션을 <details>로 접어서 길이를 줄일지
  use_collapsible: true

# 자동 알림(⚠️ 표시) 기준
alerts:
  # 일간 등락률이 이 값(%) 이상이면 Dashboard의 Alert 컬럼에 표시
  price_move_pct: 8.0
  # 거래량이 평균 거래량 대비 이 배수 이상이면 Alert에 표시
  volume_spike_x: 2.5

# 애널리스트 목표가(Price Target) 표시/알림 옵션
# - 값은 보통 Yahoo Finance(=yfinance)에서 제공하는 컨센서스 목표가입니다.
price_targets:
  show_in_dashboard: true
  show_in_details: true
  # 목표가 값이 의미있게 바뀐 경우 Alert 컬럼에 PT ... 로 표시
  alert_on_change: true
  # 변화 판정 기준 (둘 중 하나만 넘어도 changed로 간주)
  change_pct: 5.0   # %
  change_abs: 0.5   # USD

# 12개 투자 기업
# - sources는 '위에서 아래 순서'로 수집 시도 후, 발견된 기사들을 합쳐서 보여줍니다.
# - GlobeNewswire/Business Wire는 '검색 페이지'를 사용합니다.
#   (티커가 짧거나 흔한 경우(EQ 등) 결과가 섞일 수 있어, 회사명 검색 URL을 함께 넣었습니다.)
#
# anchors(앵커 지표) 안내
# - cash/net_cash/burn/runway/buyout_per_share 등은 "매일 변하는 값"이 아니라,
#   최신 10-Q/10-K 또는 오퍼링(424B5) 기준으로 업데이트되는 값입니다.
# - Daily Report에서는
#   1) 매일 변하는 값: Close/Δ%/MktCap/EV(계산)
#   2) 분기/이벤트로 변하는 값: Net Cash/Burn/Runway/Buyout PT
#   를 한 화면에 같이 보여주도록 구성했습니다.
