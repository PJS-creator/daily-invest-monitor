name: Daily Investment Monitor (to Discussions)

on:
  workflow_dispatch:
  # (옵션) GitHub Actions 자체 스케줄을 쓰고 싶다면 아래를 활성화하세요. (UTC 기준)
  # schedule:
  #   - cron: "30 22 * * *"  # 07:30 KST

permissions:
  contents: write
  discussions: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run monitor
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DISCUSSION_TITLE: "Daily Report"
          DISCUSSION_CATEGORY: "General"
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
        run: |
          python monitor.py

      - name: Commit updated state.json (if changed)
        run: |
          if git diff --quiet; then
            echo "No state changes."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/state.json
            git commit -m "Update monitor state"
            git push
          fi
