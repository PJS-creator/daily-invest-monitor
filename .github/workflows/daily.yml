name: Daily Investment Monitor (save reports + discussions)

on:
  # GitHub Actions schedule uses UTC.
  # Below example runs at 08:30 KST and 20:30 KST every day.
  schedule:
    - cron: "30 23 * * *"  # 08:30 KST
    - cron: "30 11 * * *"  # 20:30 KST
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  discussions: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure folders exist
        run: |
          mkdir -p data reports .github/workflows
          if [ ! -f data/state.json ]; then
            cat > data/state.json <<'JSON'
          {
            "last_run": null,
            "press_seen": {},
            "sec_seen": {},
            "discussion_id": null
          }
          JSON
          fi

      - name: Run monitor
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
          DISCUSSION_TITLE: "Daily Report"
          DISCUSSION_CATEGORY: "General"
          POST_TO_DISCUSSIONS: "true"
        run: |
          python monitor.py

      - name: Commit generated outputs
        if: always()
        run: |
          CHANGED="$(git status --porcelain -- data/state.json reports/)"
          if [ -z "$CHANGED" ]; then
            echo "No report or state changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin "${GITHUB_REF_NAME}" || true
          git add data/state.json reports/
          git commit -m "Update monitor outputs [skip ci]" || exit 0
          git push

      - name: Upload generated outputs (optional backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monitor-reports-${{ github.run_id }}
          path: |
            reports/
            data/state.json
          if-no-files-found: ignore
